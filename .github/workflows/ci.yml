# -----------------------------------------------------------------------------
# loom/.github/workflows/ci.yml
# -----------------------------------------------------------------------------
#
# GitHub workflow for continuous integration/continuous deployment.
#

name: Loom CI

on:
  push:
    branches:
      - "feature/*"
      - "bugfix/*"
      - "refactor/*"
      - "docs/*"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bazel Environment
        uses: bazel-contrib/setup-bazel@0.18.0

      - name: Mount Bazel Cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: ${{ runner.os }}-bazel-${{ hashFiles('MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-
        
      - name: Build
        run: bazel build //...

      - name: Test
        run: bazel test //...

